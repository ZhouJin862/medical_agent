# Secret for Medical Agent sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: medical-agent-secret
  namespace: medical-agent
type: Opaque
stringData:
  # Database credentials
  DB_HOST: "mysql.medical-agent.svc.cluster.local"
  DB_PORT: "3306"
  DB_USER: "medical_user"
  DB_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  DB_NAME: "medical_agent"

  # Redis credentials
  REDIS_HOST: "redis.medical-agent.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"

  # LLM API keys
  ANTHROPIC_API_KEY: "CHANGE_ME_ANTHROPIC_KEY"
  ANTHROPIC_BASE_URL: "https://api.anthropic.com"

  # Memory service
  MEM0_API_KEY: "CHANGE_ME_MEM0_KEY"

  # JWT secret (if using JWT auth)
  JWT_SECRET: "CHANGE_ME_JWT_SECRET"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_MINUTES: "60"
---
# Secret for MySQL (if using self-hosted)
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: medical-agent
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "CHANGE_ME_ROOT_PASSWORD"
  MYSQL_DATABASE: "medical_agent"
  MYSQL_USER: "medical_user"
  MYSQL_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
---
# Secret for Redis
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: medical-agent
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME_REDIS_PASSWORD"
