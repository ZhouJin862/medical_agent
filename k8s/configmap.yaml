# ConfigMap for Medical Agent configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: medical-agent-config
  namespace: medical-agent
data:
  # Application settings
  APP_NAME: "Medical Agent"
  DEBUG: "False"
  LOG_LEVEL: "INFO"
  PORT: "8000"

  # Feature flags
  ENABLE_WEBSOCKET: "True"
  ENABLE_STREAMING: "True"
  ENABLE_SKILLS: "True"

  # Database pool settings
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "10"
  DB_POOL_TIMEOUT: "30"
  DB_POOL_RECYCLE: "3600"

  # Cache settings
  CACHE_TTL: "300"
  CACHE_MAX_SIZE: "1000"

  # LLM settings
  MODEL: "glm-5"
  LLM_TIMEOUT: "30"
  LLM_MAX_RETRIES: "3"
  LLM_TEMPERATURE: "0.7"

  # Memory settings
  VECTOR_STORE_TYPE: "mem0"
  MEMORY_RETENTION_DAYS: "90"
