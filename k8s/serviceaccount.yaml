# ServiceAccount for Medical Agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: medical-agent
  namespace: medical-agent
---
# Role for Medical Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: medical-agent
  namespace: medical-agent
rules:
# Allow reading ConfigMaps and Secrets
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]

# Allow reading pods (for health checks)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
# RoleBinding for Medical Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: medical-agent
  namespace: medical-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: medical-agent
subjects:
- kind: ServiceAccount
  name: medical-agent
  namespace: medical-agent
