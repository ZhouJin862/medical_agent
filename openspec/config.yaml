schema: spec-driven
context: |
  本项目采用测试驱动开发（TDD）模式：
  - 所有功能实现必须遵循"红-绿-重构"循环
  - 先编写单元测试，再编写实现代码
  - 测试应覆盖正常路径、边界条件和错误情况
  - 确保所有测试通过后才能标记任务完成
  
  # 原有项目上下文...
rules:
  proposal:  # 针对 proposal.md 的规则
    - "提案必须包含业务价值描述"
    - "需列出至少一个成功指标（如测试覆盖率提升、响应时间降低等）"
  
  design:    # 针对 design.md 的规则
    - "必须包含系统上下文图或数据流图"
    - "需说明与现有模块的集成点"
    - "必须包含数据库 schema 变更（如适用）"
  
  tasks:     # 针对 tasks.md 的规则（核心 TDD 引导）
    - "每个任务必须遵循 TDD 循环：先写测试，再写实现，最后重构"
    - "测试需覆盖正常路径、边界条件和至少一个错误场景"
    - "任务完成后，必须运行所有相关测试并确保通过"
    - "测试文件必须与实现文件一一对应"
  
  specs:     # 针对 specs/ 目录下规范文件的规则
    - "每个功能点必须包含验收条件"
    - "验收条件应尽量以 Given-When-Then 格式描述"
  # 可选的工件级规则

