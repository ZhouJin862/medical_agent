[pytest]
# Pytest configuration for Medical Agent project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html

# Coverage options
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    */migrations/*
    */alembic/*
    */venv/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov

# Markers for different test categories
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may require external services)
    e2e: End-to-end tests (slowest, full workflow)
    performance: Performance tests (measure response times and throughput)
    load: Load tests (simulate concurrent users and high request volume)
    security: Security tests (verify security measures and data protection)
    slow: Tests that take more than 1 second
    requires_db: Tests that require a database connection
    requires_redis: Tests that require Redis
    requires_api: Tests that require external API services
    requires_mcp: Tests that require MCP servers
