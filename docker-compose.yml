version: "3.8"

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: medical-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_DATABASE: medical_agent
      MYSQL_USER: medical_user
      MYSQL_PASSWORD: medical_password_change_me
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: medical-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis_password_change_me
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medical_network

  # Medical Agent Service
  medical-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: medical_user
      DB_PASSWORD: medical_password_change_me
      DB_NAME: medical_agent

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password_change_me

      # LLM
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      MODEL: ${MODEL:-glm-5}

      # Memory
      MEM0_API_KEY: ${MEM0_API_KEY}
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-mem0}

      # App
      APP_NAME: "Medical Agent"
      DEBUG: ${DEBUG:-False}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - medical_network

volumes:
  mysql_data:
    driver: local

networks:
  medical_network:
    driver: bridge
